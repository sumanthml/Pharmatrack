<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PharmaTrack - Intelligent Pharmacy Inventory Management System featuring real-time stock monitoring, mathematical expiry predictions, automated alerts, and Gemini AI insights." />
    <title>PharmaTrack: Intelligent Pharmacy Inventory Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('✅ Service Worker registered with scope:', reg.scope))
            .catch((err) => console.error('❌ Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
