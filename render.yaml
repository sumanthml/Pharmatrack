services:
  # Backend Node/Express API
  - type: web
    name: pharmatrack-backend
    runtime: node
    repo: https://github.com/sumanthml/Pharmatrack # Fallback repository link
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # User will set this in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: APPS_SCRIPT_URL
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: ../serviceAccountKey.json
